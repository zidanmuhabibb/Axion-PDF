<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion PDF - Edit PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15), transparent 40%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .upload-zone { border: 2px dashed rgba(45, 212, 191, 0.4); transition: all 0.3s ease; }
        .upload-zone:hover { background: rgba(45, 212, 191, 0.05); border-color: rgba(45, 212, 191, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-200">
    <div class="relative w-full max-w-[380px] h-[780px] bg-[#111827] rounded-[3rem] shadow-2xl border-[6px] border-slate-800 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs text-slate-400 font-medium">
            <span>09:44</span><div class="flex gap-2"><span>5G</span><span>100%</span></div>
        </div>
        <div class="px-6 pt-4 pb-4 flex items-center gap-4">
            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-slate-800 transition" onclick="window.location.href='index.html'">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-white tracking-wide">Edit PDF</h1>
        </div>
        <div class="px-6 flex-1 overflow-y-auto no-scrollbar pb-28">
            <label class="glass-panel upload-zone rounded-3xl p-8 flex flex-col items-center justify-center text-center cursor-pointer mb-6 mt-2 relative">
                <input type="file" id="fileInput" accept=".pdf" class="hidden">
                <div class="w-14 h-14 bg-teal-500/20 rounded-2xl flex items-center justify-center mb-4 text-teal-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </div>
                <h3 class="text-white font-medium mb-1">Pilih PDF untuk Diedit</h3>
                <p class="text-xs text-slate-400">Ketuk untuk membuka File Manager</p>
            </label>
            <div class="space-y-3">
                <div class="glass-panel p-4 rounded-xl flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        <span class="text-sm text-white">Edit Teks</span>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        <span class="text-sm text-white">Tanda Tangan</span>
                    </div>
                </div>
                <div class="glass-panel p-4 rounded-xl flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="text-sm text-white">Tambahkan Gambar</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="absolute bottom-8 left-6 right-6">
            <div class="w-1/3 h-1 bg-slate-500 rounded-full mx-auto mt-5"></div>
        </div>
    </div>
    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                const fileNames = Array.from(this.files).map(f => f.name).join(', ');
                alert("Berhasil mengunggah: " + fileNames + "\n\n(Catatan: Ini adalah versi mockup UI. Untuk mengedit file secara nyata, diperlukan integrasi sistem backend.)");
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>

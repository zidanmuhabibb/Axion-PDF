<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion PDF - Alur Kerja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15), transparent 40%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-200">
    <div class="relative w-full max-w-[380px] h-[780px] bg-[#111827] rounded-[3rem] shadow-2xl border-[6px] border-slate-800 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs text-slate-400 font-medium">
            <span>09:47</span><div class="flex gap-2"><span>5G</span><span>100%</span></div>
        </div>
        <div class="px-6 pt-4 pb-4 flex items-center gap-4">
            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-slate-800 transition" onclick="window.location.href='index.html'">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-white tracking-wide">Alur Kerja</h1>
        </div>
        <div class="px-6 flex-1 overflow-y-auto no-scrollbar pb-28">
            <p class="text-sm text-slate-400 mb-6">Otomatiskan tugas PDF berulang Anda dengan sekali ketuk.</p>
            
            <div class="space-y-4">
                <div class="glass-panel p-4 rounded-2xl border border-teal-500/30">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-teal-400"></div>
                            <h3 class="text-sm font-semibold text-white">Laporan Mingguan</h3>
                        </div>
                        <button class="text-teal-400 hover:text-teal-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-slate-400">
                        <span class="bg-slate-800 px-2 py-1 rounded">Gabungkan</span>
                        <span>&rarr;</span>
                        <span class="bg-slate-800 px-2 py-1 rounded">Kompres</span>
                        <span>&rarr;</span>
                        <span class="bg-slate-800 px-2 py-1 rounded">Watermark</span>
                    </div>
                </div>

                <div class="glass-panel p-4 rounded-2xl">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-slate-500"></div>
                            <h3 class="text-sm font-semibold text-white">Faktur Klien</h3>
                        </div>
                        <button class="text-slate-500 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-slate-400">
                        <span class="bg-slate-800 px-2 py-1 rounded">Word ke PDF</span>
                        <span>&rarr;</span>
                        <span class="bg-slate-800 px-2 py-1 rounded">Tanda Tangan</span>
                    </div>
                </div>
            </div>

            <button class="mt-6 w-full glass-panel py-3 rounded-xl flex items-center justify-center gap-2 text-teal-400 hover:bg-teal-900/20 transition border-dashed border-2 border-teal-500/40">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="text-sm font-medium">Buat Alur Baru</span>
            </button>

        </div>
        <div class="absolute bottom-8 left-6 right-6">
            <div class="w-1/3 h-1 bg-slate-500 rounded-full mx-auto mt-5"></div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>

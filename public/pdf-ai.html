<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion PDF - PDF AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15), transparent 40%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .upload-zone { border: 2px dashed rgba(45, 212, 191, 0.4); transition: all 0.3s ease; }
        .upload-zone:hover { background: rgba(45, 212, 191, 0.05); border-color: rgba(45, 212, 191, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-200">
    <div class="relative w-full max-w-[380px] h-[780px] bg-[#111827] rounded-[3rem] shadow-2xl border-[6px] border-slate-800 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs text-slate-400 font-medium">
            <span>09:46</span><div class="flex gap-2"><span>5G</span><span>100%</span></div>
        </div>
        <div class="px-6 pt-4 pb-4 flex items-center gap-4">
            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-slate-800 transition" onclick="window.location.href='index.html'">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-white tracking-wide">PDF Intelligence</h1>
        </div>
        <div class="px-6 flex-1 overflow-y-auto no-scrollbar pb-28">
            
            <div class="glass-panel p-4 rounded-3xl mb-4 bg-teal-900/20 border-teal-500/30">
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 rounded-full bg-teal-500/20 flex items-center justify-center shrink-0">
                        <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm text-white">Halo! Saya asisten AI Anda. Unggah dokumen PDF dan saya bisa merangkum atau menerjemahkannya.</p>
                    </div>
                </div>
            </div>

            <label class="glass-panel upload-zone rounded-3xl p-6 flex flex-col items-center justify-center text-center cursor-pointer mb-6 relative">
                <input type="file" id="fileInput" accept=".pdf" class="hidden">
                <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center mb-3">
                    <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                </div>
                <h3 class="text-sm font-medium text-white">Ketuk untuk Mengunggah</h3>
            </label>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-panel p-3 rounded-xl flex flex-col items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <svg class="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="text-xs">Rangkum PDF</span>
                </div>
                <div class="glass-panel p-3 rounded-xl flex flex-col items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <svg class="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                    <span class="text-xs">Terjemahkan</span>
                </div>
            </div>
        </div>
        <div class="absolute bottom-8 left-6 right-6">
            <div class="glass-panel rounded-2xl px-4 py-3 flex items-center gap-3">
                <input type="text" placeholder="Tanya AI tentang dokumen..." class="bg-transparent border-none outline-none text-sm w-full text-white placeholder-slate-500">
                <button class="w-8 h-8 rounded-full bg-teal-500/20 text-teal-400 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
            <div class="w-1/3 h-1 bg-slate-500 rounded-full mx-auto mt-6"></div>
        </div>
    </div>
    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                const fileNames = Array.from(this.files).map(f => f.name).join(', ');
                alert("Berhasil mengunggah: " + fileNames + "\n\n(Catatan: Ini adalah versi mockup UI. Untuk memproses PDF dengan AI secara nyata, diperlukan integrasi sistem backend.)");
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>

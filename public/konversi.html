<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion PDF - Konversi PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15), transparent 40%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .upload-zone { border: 2px dashed rgba(45, 212, 191, 0.4); transition: all 0.3s ease; }
        .upload-zone:hover { background: rgba(45, 212, 191, 0.05); border-color: rgba(45, 212, 191, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-200">
    <div class="relative w-full max-w-[380px] h-[780px] bg-[#111827] rounded-[3rem] shadow-2xl border-[6px] border-slate-800 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs text-slate-400 font-medium">
            <span>09:43</span><div class="flex gap-2"><span>5G</span><span>100%</span></div>
        </div>
        <div class="px-6 pt-4 pb-4 flex items-center gap-4">
            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-slate-800 transition" onclick="window.location.href='index.html'">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-white tracking-wide">Konversi PDF</h1>
        </div>
        <div class="px-6 flex-1 overflow-y-auto no-scrollbar pb-28">
            <label class="glass-panel upload-zone rounded-3xl p-8 flex flex-col items-center justify-center text-center cursor-pointer mb-6 mt-2 relative">
                <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png" multiple class="hidden">
                <div class="w-14 h-14 bg-teal-500/20 rounded-2xl flex items-center justify-center mb-4 text-teal-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </div>
                <h3 class="text-white font-medium mb-1">Unggah Dokumen</h3>
                <p class="text-xs text-slate-400">Ketuk untuk membuka File Manager</p>
            </label>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="col-span-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1 mt-2">Dari PDF</div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-blue-900/40 rounded flex items-center justify-center text-blue-400 font-bold text-xs">W</div>
                    <span class="text-sm">Ke Word</span>
                </div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-green-900/40 rounded flex items-center justify-center text-green-400 font-bold text-xs">X</div>
                    <span class="text-sm">Ke Excel</span>
                </div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-orange-900/40 rounded flex items-center justify-center text-orange-400 font-bold text-xs">P</div>
                    <span class="text-sm">Ke PPT</span>
                </div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-yellow-900/40 rounded flex items-center justify-center text-yellow-400 font-bold text-xs">J</div>
                    <span class="text-sm">Ke JPG</span>
                </div>
                
                <div class="col-span-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-2 mb-1">Ke PDF</div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-blue-900/40 rounded flex items-center justify-center text-blue-400 font-bold text-xs">W</div>
                    <span class="text-sm">Word ke PDF</span>
                </div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-green-900/40 rounded flex items-center justify-center text-green-400 font-bold text-xs">X</div>
                    <span class="text-sm">Excel ke PDF</span>
                </div>
                <div class="glass-panel p-3 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-teal-900/40 border border-transparent hover:border-teal-500/30">
                    <div class="w-8 h-8 bg-yellow-900/40 rounded flex items-center justify-center text-yellow-400 font-bold text-xs">J</div>
                    <span class="text-sm">JPG ke PDF</span>
                </div>
            </div>
        </div>
        <div class="absolute bottom-8 left-6 right-6">
            <button class="w-full bg-teal-400 hover:bg-teal-300 text-slate-900 font-bold py-4 px-6 rounded-2xl shadow-[0_0_20px_rgba(45,212,191,0.3)] transition-all flex justify-center items-center gap-2">
                <span>Konversi Sekarang</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
            <div class="w-1/3 h-1 bg-slate-500 rounded-full mx-auto mt-5"></div>
        </div>
    </div>
    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                const fileNames = Array.from(this.files).map(f => f.name).join(', ');
                alert("Berhasil mengunggah: " + fileNames + "\n\n(Catatan: Ini adalah versi mockup UI. Untuk mengonversi file secara nyata, diperlukan integrasi sistem backend.)");
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>

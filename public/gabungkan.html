<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion PDF - Gabungkan PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15), transparent 40%);
        }
        
        /* Efek Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Khusus untuk area unggah (Drag & Drop) */
        .upload-zone {
            border: 2px dashed rgba(45, 212, 191, 0.4);
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            background: rgba(45, 212, 191, 0.05);
            border-color: rgba(45, 212, 191, 0.8);
        }

        /* Sembunyikan Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-200">

    <div class="relative w-full max-w-[380px] h-[780px] bg-[#111827] rounded-[3rem] shadow-2xl border-[6px] border-slate-800 overflow-hidden flex flex-col">
        
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs text-slate-400 font-medium">
            <span>09:42</span>
            <div class="flex gap-2">
                <span>5G</span>
                <span>100%</span>
            </div>
        </div>

        <div class="px-6 pt-4 pb-4 flex items-center gap-4">
            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-slate-800 transition" onclick="window.location.href='optimalkan.html'">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <h1 class="text-xl font-semibold text-white tracking-wide">Gabungkan PDF</h1>
        </div>

        <div class="px-6 flex-1 overflow-y-auto no-scrollbar pb-28">
            
            <label class="glass-panel upload-zone rounded-3xl p-8 flex flex-col items-center justify-center text-center cursor-pointer mb-6 mt-2 relative">
                <input type="file" id="fileInput" accept=".pdf" multiple class="hidden">
                <div class="w-14 h-14 bg-teal-500/20 rounded-2xl flex items-center justify-center mb-4 text-teal-400">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </div>
                <h3 class="text-white font-medium mb-1">Pilih File PDF</h3>
                <p class="text-xs text-slate-400">Ketuk untuk membuka File Manager</p>
            </label>

            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">File Terpilih (2)</span>
                <button class="text-xs text-teal-400 hover:text-teal-300">Bersihkan Semua</button>
            </div>

            <div class="space-y-3">
                
                <div class="glass-panel p-3 rounded-xl flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5 text-rose-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white truncate">Laporan_Keuangan_Q1.pdf</p>
                        <p class="text-[10px] text-slate-400">1.2 MB • 12 Halaman</p>
                    </div>
                    <div class="flex flex-col gap-1 shrink-0">
                        <button class="text-slate-500 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg></button>
                        <button class="text-slate-500 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                    </div>
                    <button class="ml-2 w-8 h-8 rounded-full bg-rose-500/10 text-rose-400 flex items-center justify-center hover:bg-rose-500/20 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>

                <div class="glass-panel p-3 rounded-xl flex items-center gap-3 border border-teal-500/30">
                    <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5 text-rose-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white truncate">Lampiran_Dokumen_B.pdf</p>
                        <p class="text-[10px] text-slate-400">845 KB • 5 Halaman</p>
                    </div>
                    <div class="flex flex-col gap-1 shrink-0">
                        <button class="text-slate-500 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg></button>
                        <button class="text-slate-500 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                    </div>
                    <button class="ml-2 w-8 h-8 rounded-full bg-rose-500/10 text-rose-400 flex items-center justify-center hover:bg-rose-500/20 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>

            </div>
        </div>

        <div class="absolute bottom-8 left-6 right-6">
            <button id="btnGabungkan" class="w-full bg-teal-400 hover:bg-teal-300 text-slate-900 font-bold py-4 px-6 rounded-2xl shadow-[0_0_20px_rgba(45,212,191,0.3)] transition-all flex justify-center items-center gap-2">
                <span id="btnText">Gabungkan PDF</span>
                <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
            <div class="w-1/3 h-1 bg-slate-500 rounded-full mx-auto mt-5"></div>
        </div>

    </div>

    <script>
        let selectedFiles = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                selectedFiles = Array.from(this.files);
                const fileNames = selectedFiles.map(f => f.name).join(', ');
                alert("Berhasil memilih " + selectedFiles.length + " file: \n" + fileNames + "\n\nSilakan ketuk tombol 'Gabungkan PDF' di bawah.");
            }
        });

        document.getElementById('btnGabungkan').addEventListener('click', async function() {
            if (selectedFiles.length < 2) {
                alert('Silakan pilih minimal 2 file PDF untuk digabungkan.');
                return;
            }

            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            btnText.innerText = "Memproses...";
            btnIcon.classList.add('animate-spin');

            try {
                // Initialize a new PDF Document
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                // Loop through selected files
                for (let file of selectedFiles) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                // Serialize to bytes
                const pdfBytes = await mergedPdf.save();

                // Download the resulting PDF
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'hasil_gabungan.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                alert('PDF Berhasil Digabungkan dan Diunduh secara Offline!');
                selectedFiles = []; // reset
            } catch (error) {
                alert('Terjadi kesalahan: ' + error.message);
            } finally {
                btnText.innerText = "Gabungkan PDF";
                btnIcon.classList.remove('animate-spin');
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>

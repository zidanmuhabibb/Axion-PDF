<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion PDF - Optimalkan PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15), transparent 40%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-200">
    <div class="relative w-full max-w-[380px] h-[780px] bg-[#111827] rounded-[3rem] shadow-2xl border-[6px] border-slate-800 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs text-slate-400 font-medium">
            <span>09:48</span><div class="flex gap-2"><span>5G</span><span>100%</span></div>
        </div>
        <div class="px-6 pt-4 pb-4 flex items-center gap-4">
            <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-slate-800 transition" onclick="window.location.href='index.html'">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-semibold text-white tracking-wide">Optimalkan PDF</h1>
        </div>
        <div class="px-6 flex-1 overflow-y-auto no-scrollbar pb-28 pt-4">
            <div class="space-y-4">
                <div class="glass-panel p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-teal-900/30 transition" onclick="window.location.href='gabungkan.html'">
                    <div class="w-12 h-12 bg-teal-500/20 rounded-xl flex items-center justify-center text-teal-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-medium">Gabungkan PDF</h3>
                        <p class="text-[10px] text-slate-400">Gabung beberapa PDF jadi satu</p>
                    </div>
                    <svg class="w-5 h-5 text-slate-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-teal-900/30 transition" onclick="window.location.href='pisahkan.html'">
                    <div class="w-12 h-12 bg-teal-500/20 rounded-xl flex items-center justify-center text-teal-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8M8 11h8M8 15h8M4 5h16v14H4V5zM4 12h16"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-medium">Pisahkan PDF</h3>
                        <p class="text-[10px] text-slate-400">Ekstrak halaman tertentu</p>
                    </div>
                    <svg class="w-5 h-5 text-slate-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-teal-900/30 transition" onclick="window.location.href='kompres.html'">
                    <div class="w-12 h-12 bg-teal-500/20 rounded-xl flex items-center justify-center text-teal-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-medium">Kompres PDF</h3>
                        <p class="text-[10px] text-slate-400">Perkecil ukuran file PDF</p>
                    </div>
                    <svg class="w-5 h-5 text-slate-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </div>
        </div>
        <div class="absolute bottom-8 left-6 right-6">
            <div class="w-1/3 h-1 bg-slate-500 rounded-full mx-auto mt-5"></div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
